name: task_manager
description: "A production-grade task management Flutter application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  flutter_riverpod: ^2.4.9
  dio: ^5.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  equatable: ^2.0.5
  uuid: ^4.2.2
  intl: ^0.20.2
  connectivity_plus: ^5.0.2
  image_picker: ^1.0.7
  share_plus: ^10.0.2
  flutter_local_notifications: ^19.4.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/todo_splash.png
